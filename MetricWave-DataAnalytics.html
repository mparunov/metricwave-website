<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MetricWave — Data Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0A; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  html[data-theme="light"], html[data-theme="light"] body { background: #FFFFFF; }
  body { min-height: 100vh; }
  /* fit() scales the 1920×800 panel into the viewport, top-left origin */
  #fit-stage { position: relative; width: 1920px; height: 800px; transform-origin: top left; }
  #fit-wrap  { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

  @keyframes mwDraw     { to { stroke-dashoffset: 0; } }
  @keyframes mwPulse    { 0%,100% { opacity:1; transform: scale(1); } 50% { opacity:0.45; transform: scale(0.92); } }
  @keyframes mwPulseStroke { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
  @keyframes mwPulseRing{ 0% { opacity:0.6; r:5; } 100% { opacity:0; r:18; } }
  @keyframes mwBar      { from { transform: scaleY(0.3); } to { transform: scaleY(1.05); } }
  @keyframes mwSpin     { to { transform: rotate(360deg); } }
  @keyframes mwFadeIn   { from { opacity:0; } to { opacity:1; } }
  @keyframes mwSlideIn  { from { opacity:0; transform: translateX(-30px); } to { opacity:1; transform: translateX(0); } }
  @keyframes mwSlideInR { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: translateX(0); } }
  @keyframes mwSlideUp  { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  @keyframes mwGrow     { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes mwScaleX   { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes mwPop      { from { opacity:0; transform: scale(0.6); } to { opacity:1; transform: scale(1); } }
  @keyframes mwDashFlow { to { stroke-dashoffset: -100; } }
  @keyframes mwBlink    { 50% { opacity: 0; } }
  @keyframes mwBlinkOut { 0%, 75% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes mwBadgeCycle {
    0%, 30%   { opacity: 1; }
    33%, 63%  { opacity: 1; }
    66%, 96%  { opacity: 1; }
    100%      { opacity: 1; }
  }
  @keyframes mwStatPop {
    0%   { opacity: 0; transform: translateX(8px); }
    12%  { opacity: 1; transform: translateX(0); }
    88%  { opacity: 1; transform: translateX(0); }
    100% { opacity: 0; transform: translateX(-8px); }
  }
</style>
<script>
  (function(){
    var t = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", t);
  })();
  window.addEventListener("message", function(e) {
    if (e.data && e.data.type === "mw-theme") {
      document.documentElement.setAttribute("data-theme", e.data.theme);
    }
  });
</script>
</head>
<body>
<div id="fit-wrap"><div id="fit-stage"><div id="root"></div></div></div>

<script>
  function fit() {
    const stage = document.getElementById('fit-stage');
    const wrap  = document.getElementById('fit-wrap');
    if (!stage || !wrap) return;
    const sx = wrap.clientWidth / 1920;
    const sy = wrap.clientHeight / 800;
    const s = Math.max(sx, sy);
    stage.style.transform = 'scale(' + s + ')';
    stage.style.left = '0px';
    stage.style.top  = '0px';
  }
  window.addEventListener('load',  fit);
  window.addEventListener('resize', fit);
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
/* global React */
const { useState, useEffect } = React;

/* ============================================================
   MetricWave — Service hero shell (1920 × 800)
   Auto-detects light/dark via data-theme on <html>.
   Slot a Schematic into the right column.
============================================================ */

const HERO_TOKENS = {
  dark: {
    bg:        "#0A0A0A",
    surface1:  "#1A1A1A",
    surface2:  "#2A2A2A",
    border:    "#3A3A3A",
    text1:     "#FFFFFF",
    text2:     "#E5E5E5",
    teal:      "#2DD4BF",
    tealDk:    "#14B8A6",
    tealLt:    "#5EEAD4",
    tealGlow:  "rgba(45,212,191,0.15)",
    warn:      "#F59E0B",
    warnGlow:  "rgba(245,158,11,0.18)",
    ok:        "#22C55E",
    nodeFill:  "#1A1A1A",
    modelFill: "#1A1A1A",
    modelInk:  "#FFFFFF",
    accentBg:  "#2DD4BF",
    accentInk: "#0A0A0A",
  },
  light: {
    bg:        "#FFFFFF",
    surface1:  "#F4F4F6",
    surface2:  "#E8E8EC",
    border:    "#C8C8D4",
    text1:     "#0D0D10",
    text2:     "#404050",
    teal:      "#0D9488",
    tealDk:    "#0F766E",
    tealLt:    "#14B8A6",
    tealGlow:  "rgba(13,148,136,0.12)",
    warn:      "#D97706",
    warnGlow:  "rgba(217,119,6,0.18)",
    ok:        "#16A34A",
    nodeFill:  "#FFFFFF",
    modelFill: "#0D0D10",
    modelInk:  "#FFFFFF",
    accentBg:  "#0D9488",
    accentInk: "#FFFFFF",
  },
};

function useTheme() {
  const initial = (typeof document !== "undefined" &&
    document.documentElement.getAttribute("data-theme")) || "dark";
  const [mode, setMode] = useState(initial);
  useEffect(() => {
    const obs = new MutationObserver(() => {
      const next = document.documentElement.getAttribute("data-theme") || "dark";
      setMode(next);
    });
    obs.observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });
    return () => obs.disconnect();
  }, []);
  return mode;
}

function HeroLogo({ color, mode }) {
  return (
    <div style={{ display: "inline-flex", alignItems: "center", gap: 10 }}>
      <img
        src="../assets/metricwave-mark.png"
        alt=""
        style={{
          height: 34, width: "auto", objectFit: "contain",
          filter: mode === "dark" ? "brightness(1.1) saturate(1.1)" : "none",
        }}
      />
      <span style={{
        fontFamily: "'Inter', system-ui, sans-serif",
        fontWeight: 700, fontSize: 22,
        letterSpacing: "-0.02em", color,
      }}>MetricWave</span>
    </div>
  );
}

/* ============================================================
   ServiceHero — full 1920×800 panel
============================================================ */
function ServiceHero({
  eyebrow,
  headline,
  lead,
  ctaPrimary,
  ctaSecondary,
  ticker,
  Schematic,
  navActive = "Services",
  showNav = true,
}) {
  const mode = useTheme();
  const t = HERO_TOKENS[mode];
  const navItems = ["Home", "About", "Services", "Industries", "Pricing", "Blog"];

  // When nav is hidden, shift content up to fill the extra space
  const copyTop    = showNav ? 240 : 130;
  const schemTop   = showNav ? 140 :  40;
  const schemHeight = showNav ? 560 : 660;

  return (
    <div style={{
      width: 1920, height: 800,
      background: t.bg,
      position: "relative", overflow: "hidden",
      fontFamily: "'Inter', system-ui, sans-serif",
      color: t.text1,
      isolation: "isolate",
    }}>
      {/* fine grid */}
      <svg width="1920" height="800" style={{ position: "absolute", inset: 0, opacity: mode === "dark" ? 0.4 : 0.55 }}>
        <defs>
          <pattern id={`heroGrid-${mode}`} width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M0 0H40M0 0V40" stroke={t.border} strokeWidth="0.5" />
          </pattern>
          <pattern id={`heroGridBig-${mode}`} width="200" height="200" patternUnits="userSpaceOnUse">
            <path d="M0 0H200M0 0V200" stroke={t.border} strokeWidth="0.7" />
          </pattern>
        </defs>
        <rect width="1920" height="800" fill={`url(#heroGrid-${mode})`} />
        <rect width="1920" height="800" fill={`url(#heroGridBig-${mode})`} opacity="0.7" />
      </svg>

      {mode === "dark" && (
        <div style={{
          position: "absolute", inset: 0,
          background: `radial-gradient(900px 600px at 70% 50%, ${t.tealGlow}, transparent 70%)`,
          zIndex: 1,
        }} />
      )}

      {/* nav — only shown in standalone/preview mode */}
      {showNav && (
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0,
          padding: "30px 80px",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          zIndex: 4,
        }}>
          <HeroLogo color={t.text1} mode={mode} />
          <nav style={{ display: "flex", gap: 36, fontSize: 14, color: t.text2, letterSpacing: "-0.005em" }}>
            {navItems.map((n) => (
              <span key={n} style={{
                color: n === navActive ? t.text1 : t.text2,
                fontWeight: n === navActive ? 600 : 400,
                paddingBottom: 2,
                borderBottom: n === navActive ? `1.5px solid ${t.teal}` : "1.5px solid transparent",
              }}>{n}</span>
            ))}
          </nav>
          <button style={{
            fontFamily: "inherit", fontSize: 13, fontWeight: 600,
            padding: "10px 18px", borderRadius: 7, cursor: "pointer",
            border: "none", background: t.accentBg, color: t.accentInk,
          }}>Contact</button>
        </div>
      )}

      {/* LEFT COLUMN — copy */}
      <div style={{
        position: "absolute", left: 80, top: copyTop, width: 500, zIndex: 3,
      }}>
        <div style={{
          fontFamily: "'Courier New', monospace",
          fontSize: "0.7rem",
          letterSpacing: "0.15em",
          textTransform: "uppercase",
          color: t.teal, marginBottom: 22,
        }}>{eyebrow}</div>

        <h1 style={{
          fontFamily: "'Inter', system-ui, sans-serif",
          fontWeight: 900,
          fontSize: "clamp(3rem, 4vw, 4.25rem)",
          lineHeight: 1.1,
          letterSpacing: "-0.025em",
          color: t.text1, margin: 0, textWrap: "balance",
        }}>
          {headline.pre}
          {headline.italic && (
            <>{" "}<span style={{ color: t.teal }}>{headline.italic}</span></>
          )}
          {headline.post && <>{" "}{headline.post}</>}
          {headline.cursor && <BlinkCursor color={t.teal} />}
        </h1>

        <p style={{
          fontSize: "1.05rem", lineHeight: 1.6,
          color: t.text2, marginTop: 26, marginBottom: 0,
          maxWidth: 460, textWrap: "pretty", fontWeight: 400,
        }}>{lead}</p>

        <div style={{ display: "flex", gap: 12, marginTop: 32 }}>
          <button style={{
            fontFamily: "inherit", fontSize: 14, fontWeight: 700,
            padding: "12px 28px", borderRadius: 8, cursor: "pointer",
            border: "none", background: t.teal, color: t.bg,
            letterSpacing: "-0.01em",
          }}>{ctaPrimary} →</button>
          <button style={{
            fontFamily: "inherit", fontSize: 14, fontWeight: 700,
            padding: "12px 28px", borderRadius: 8, cursor: "pointer",
            background: "transparent", color: t.teal,
            border: `2px solid ${t.teal}`,
            letterSpacing: "-0.01em",
          }}>{ctaSecondary}</button>
        </div>
      </div>

      {/* RIGHT COLUMN — schematic */}
      <div style={{
        position: "absolute",
        left: 620, top: schemTop, width: 1220, height: schemHeight,
        zIndex: 2,
      }}>
        <Schematic t={t} mode={mode} />
      </div>

      {/* TICKER strip */}
      <div style={{
        position: "absolute", left: 0, right: 0, bottom: 0, height: 30,
        zIndex: 5,
        background: t.surface1,
        borderTop: `1px solid ${t.border}`,
        display: "flex", alignItems: "center",
        padding: "0 80px",
        justifyContent: "space-between",
        fontFamily: "'Courier New', monospace",
        fontSize: "0.65rem",
        color: t.teal, letterSpacing: "0.12em", textTransform: "uppercase",
      }}>
        <span>{ticker}</span>
        <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{
            width: 6, height: 6, borderRadius: 999,
            background: t.teal, animation: "mwPulse 1.6s infinite",
          }} />
          Live · Always in sync
        </span>
      </div>
    </div>
  );
}

function BlinkCursor({ color }) {
  return (
    <span style={{
      display: "inline-block", width: "0.5ch", marginLeft: 4,
      animation: "mwBlinkOut 4s linear forwards, mwBlink 0.6s steps(2) infinite",
      color,
    }}>|</span>
  );
}

Object.assign(window, { ServiceHero, HERO_TOKENS, useTheme });

</script>
<script type="text/babel" data-presets="env,react">
/* global React */
const { useState, useEffect } = React;

/* ============================================================
   Shared schematic primitives — used by every service hero.
   Right-column canvas: 1220 × 560 (svg viewBox 0 0 1220 560)
============================================================ */

function NodeCard({
  x, y, w = 200, h = 56, label, sub,
  t, accent = false, status = "live",
}) {
  const dotColor = status === "warn" ? t.warn : status === "ok" ? t.ok : t.teal;
  return (
    <g>
      <rect x={x} y={y} width={w} height={h} rx={10}
        fill={t.nodeFill}
        stroke={accent ? t.teal : t.border}
        strokeWidth={accent ? 1.4 : 1} />
      <circle cx={x + 14} cy={y + h/2 - 8} r={3.5} fill={dotColor} opacity="0.95">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite" />
      </circle>
      <text x={x + 26} y={y + h/2 - 4}
        fontFamily="'Courier New', monospace" fontSize="11" fontWeight="600"
        fill={t.text1} letterSpacing="0.06em">{label}</text>
      {sub && (
        <text x={x + 26} y={y + h/2 + 11}
          fontFamily="'Courier New', monospace" fontSize="9.5"
          fill={t.text2} letterSpacing="0.1em">{sub.toUpperCase()}</text>
      )}
    </g>
  );
}

function FlowEdge({
  d, t, mode, gradId, strokeWidth = 1.6,
  drawDelay = 0, particleDelay = 0, particleColor, particleDur = 3.2,
  particles = 1,
}) {
  const arr = Array.from({ length: particles });
  return (
    <g>
      <path d={d} fill="none" stroke={`url(#${gradId})`} strokeWidth={strokeWidth}
        style={{
          strokeDasharray: 1000, strokeDashoffset: 1000,
          animation: `mwDraw 1.4s ${drawDelay}ms cubic-bezier(.5,0,.2,1) forwards`,
        }} />
      {arr.map((_, i) => (
        <circle key={i} r="3.5" fill={particleColor || t.teal} opacity="0">
          <animateMotion dur={`${particleDur}s`} begin={`${particleDelay + i * particleDur / particles}s`}
            repeatCount="indefinite" path={d} />
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1"
            dur={`${particleDur}s`} begin={`${particleDelay + i * particleDur / particles}s`}
            repeatCount="indefinite" />
        </circle>
      ))}
    </g>
  );
}

function EdgeDefs({ t, mode }) {
  return (
    <>
      <linearGradient id={`edgeIn-${mode}`} x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stopColor={t.teal} stopOpacity="0.15" />
        <stop offset="100%" stopColor={t.teal} stopOpacity="0.85" />
      </linearGradient>
      <linearGradient id={`edgeOut-${mode}`} x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stopColor={t.teal} stopOpacity="0.85" />
        <stop offset="100%" stopColor={t.teal} stopOpacity="0.15" />
      </linearGradient>
      <linearGradient id={`edgeWarn-${mode}`} x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stopColor={t.warn} stopOpacity="0.2" />
        <stop offset="100%" stopColor={t.warn} stopOpacity="0.85" />
      </linearGradient>
      <radialGradient id={`modelGlow-${mode}`} cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stopColor={t.teal} stopOpacity="0.4" />
        <stop offset="60%" stopColor={t.teal} stopOpacity="0.05" />
        <stop offset="100%" stopColor={t.teal} stopOpacity="0" />
      </radialGradient>
      <radialGradient id={`warnGlow-${mode}`} cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stopColor={t.warn} stopOpacity="0.45" />
        <stop offset="100%" stopColor={t.warn} stopOpacity="0" />
      </radialGradient>
    </>
  );
}

function Crosshairs({ t, w = 1220, h = 560, inset = 12 }) {
  return (
    <>
      {[[inset, inset], [w - inset, inset], [inset, h - inset], [w - inset, h - inset]].map(([x, y], i) => (
        <g key={`c-${i}`} stroke={t.text2} strokeWidth="0.7" opacity="0.35">
          <line x1={x - 6} y1={y} x2={x + 6} y2={y} />
          <line x1={x} y1={y - 6} x2={x} y2={y + 6} />
        </g>
      ))}
    </>
  );
}

/* count-up text node */
function CountUp({ to, dur = 1.5, prefix = "", suffix = "", x, y, ...rest }) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let raf, start;
    const animate = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / (dur * 1000));
      const eased = 1 - Math.pow(1 - p, 3);
      setV(to * eased);
      if (p < 1) raf = requestAnimationFrame(animate);
    };
    raf = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(raf);
  }, [to, dur]);
  const display = to >= 1000
    ? Math.round(v).toLocaleString()
    : (to % 1 === 0 ? Math.round(v) : v.toFixed(1));
  return <text x={x} y={y} {...rest}>{prefix}{display}{suffix}</text>;
}

/* "x s ago" rolling label */
function AgoTicker({ x, y, ...rest }) {
  const [s, setS] = useState(2);
  useEffect(() => {
    const id = setInterval(() => setS((p) => (p + 1) % 8), 1000);
    return () => clearInterval(id);
  }, []);
  const txt = s === 0 ? "just now" : `${s}s ago`;
  return <text x={x} y={y} {...rest}>last sync: {txt}</text>;
}

Object.assign(window, { NodeCard, FlowEdge, EdgeDefs, Crosshairs, CountUp, AgoTicker });

</script>
<script type="text/babel" data-presets="env,react">
/* global React, NodeCard, FlowEdge, EdgeDefs, Crosshairs, CountUp, AgoTicker */
const { useState, useEffect } = React;

/* All schematics render into 1220 × 560 viewBox.
   Right column container is 1220 × 560. */

/* ============================================================
   1. DATA ANALYTICS — Dashboard Assembly
============================================================ */
function SchemAnalytics({ t, mode }) {

        <text x={60} y={406} fontFamily="'Courier New', monospace" fontSize="10"
          fill={t.text2} letterSpacing="0.15em">CHANNELS</text>
        {[60, 100, 70, 90, 50].map((h, i) => (
          <rect key={i}
            x={70 + i * 36} y={490 - h} width={24} height={h} rx="2"
            fill={t.teal} opacity={0.6 + i * 0.08}
            style={{
              transformOrigin: `${82 + i * 36}px 490px`,
              animation: `mwGrow 1s ${1.0 + i * 0.08}s cubic-bezier(.5,0,.2,1) backwards`,
            }} />
        ))}
      </g>

              <circle cx={x + 25} cy={y + 40} r="2.5" fill={statusColor}>
                {phase === 1 && <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite" />}

              <text x={x + 32} y={y + 44} fontFamily="'Courier New', monospace" fontSize="9" fontWeight="700"

            </g>
            <text x={x + 184} y={y + 44} textAnchor="end" fontFamily="'Courier New', monospace" fontSize="9"
              fill={t.text2} letterSpacing="0.08em">→ {Math.floor(Math.random() * 40 + 10)}/h</text>

        );
      })}

      <text x={580} y={104} textAnchor="middle" fontFamily="'Courier New', monospace" fontSize="9"
        fontWeight="700" fill={t.text2} letterSpacing="0.18em">EDITORIAL</text>

      {/* cards stacked, fanned */}
      {cards.slice().reverse().map((c, ri) => {
        const i = cards.length - 1 - ri;
        const cw = 380, ch = 200;
        return (
          <g key={i}
            opacity={c.op}
            style={{ animation: `mwSlideInR 0.6s ${c.delay}s backwards` }}
          >
            <rect x={c.x} y={c.y} width={cw} height={ch} rx="14"
              fill={t.nodeFill} stroke={t.border} strokeWidth="1" />
            {/* image placeholder block */}
            <rect x={c.x + 16} y={c.y + 16} width={88} height={88} rx="6"
              fill={t.teal} fillOpacity="0.18" />
            {/* category tag */}
            <text x={c.x + 120} y={c.y + 36} fontFamily="'Courier New', monospace"
              fontSize="10" fontWeight="700" fill={t.teal} letterSpacing="0.18em">· {c.cat} ·</text>
            {/* headline */}
            <foreignObject x={c.x + 120} y={c.y + 46} width={cw - 136} height={70}>
              <div xmlns="http://www.w3.org/1999/xhtml" style={{
                fontFamily: "'Inter', sans-serif",
                fontSize: 14, fontWeight: 700, lineHeight: 1.3,
                color: t.text1, textWrap: "balance",
              }}>{c.title}</div>
            </foreignObject>
            {/* footer */}
            <line x1={c.x + 16} y1={c.y + ch - 38} x2={c.x + cw - 16} y2={c.y + ch - 38}
              stroke={t.border} />
            <rect x={c.x + 16} y={c.y + ch - 28} width={56} height={18} rx="9"
              fill={t.surface2} />
            <text x={c.x + 44} y={c.y + ch - 15} textAnchor="middle"
              fontFamily="'Courier New', monospace" fontSize="9" fontWeight="700"
              fill={t.text1} letterSpacing="0.1em">{c.read.toUpperCase()}</text>
            <text x={c.x + cw - 16} y={c.y + ch - 14} textAnchor="end"
              fontFamily="'Courier New', monospace" fontSize="9.5"
              fill={t.text2} letterSpacing="0.1em">{c.date.toUpperCase()}</text>
          </g>
        );
      })}

      {/* reader stats badge */}
      <g style={{ animation: "mwFadeIn 0.6s 1.2s backwards" }}>
        <rect x={840} y={485} width={340} height={50} rx="10"
          fill={t.surface1} stroke={t.teal} strokeWidth="1" />
        <text x={860} y={517} fontFamily="'Courier New', monospace" fontSize="12" fontWeight="700"
          fill={t.teal} letterSpacing="0.06em">8 min avg read · 2,400 monthly readers</text>
      </g>

      {/* small "read more" arrows */}
      {cards.map((c, i) => (
        <g key={i} style={{ animation: `mwFadeIn 0.4s ${c.delay + 0.6}s backwards` }} opacity={c.op}>
          <text x={c.x + 380 - 32} y={c.y + 36} textAnchor="end"
            fontFamily="'Courier New', monospace" fontSize="11" fill={t.text2}>→</text>
        </g>
      ))}

      <Crosshairs t={t} />
    </svg>
  );
}

/* ============================================================
   8. INDUSTRIES — Hexagon Cluster
============================================================ */
function SchemIndustries({ t, mode }) {
  const hexes = [
    { id: "logistics", row: 0, col: 0, label: "LOGISTICS",      stat: "MTL Moving · Dynamic Movers" },
    { id: "saas",      row: 0, col: 1, label: "REGULATED SAAS", stat: "150+ product releases" },
    { id: "gov",       row: 0, col: 2, label: "GOV & POLICY",   stat: "€3.3M EU programme" },
    { id: "nonprofit", row: 1, col: 0, label: "NON-PROFIT",     stat: "3,000+ municipalities" },
    { id: "edu",       row: 1, col: 1, label: "EDUCATION",      stat: "2 Notre Dame alumni" },
    { id: "ai",        row: 1, col: 2, label: "AI GOVERNANCE",  stat: "AI governance NGO" },
  ];

  const HEX_R = 75;        // radius
  const HEX_W = HEX_R * Math.sqrt(3);
  const HEX_H = HEX_R * 2;
  const VERT_GAP = HEX_R * 1.5;
  const ORIGIN_X = 250, ORIGIN_Y = 160;

  function hexPos(row, col) {
    const x = ORIGIN_X + col * HEX_W + (row % 2 === 1 ? HEX_W / 2 : 0);
    const y = ORIGIN_Y + row * VERT_GAP;
    return { x, y };
  }

  function hexPoints(cx, cy, r = HEX_R) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 2;
      pts.push(`${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`);
    }
    return pts.join(" ");
  }

  const [active, setActive] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setActive((p) => (p + 1) % hexes.length), 2500);
    return () => clearInterval(id);
  }, []);

  const activeHex = hexes[active];
  const pos = hexPos(activeHex.row, activeHex.col);

  // Simple icons per industry
  const Icon = ({ id, color, x, y }) => {
    const s = 1.4;
    return (
      <g transform={`translate(${x - 14}, ${y - 14}) scale(${s})`} stroke={color} strokeWidth="1.4" fill="none" strokeLinecap="round">
        {id === "logistics" && (
          <g>
            <rect x={1} y={6} width={12} height={8} />
            <path d="M13 8 L18 8 L20 12 L20 14 L13 14" />
            <circle cx={5}  cy={16} r="1.6" fill={color} />
            <circle cx={16} cy={16} r="1.6" fill={color} />
          </g>
        )}
        {id === "saas" && (
          <path d="M10 1 L18 4 L18 11 C 18 15, 14 18, 10 19 C 6 18, 2 15, 2 11 L 2 4 Z" />
        )}
        {id === "gov" && (
          <g>
            <path d="M2 18 L18 18" />
            <path d="M3 18 L3 7 M7 18 L7 7 M13 18 L13 7 M17 18 L17 7" />
            <path d="M1 7 L19 7 L10 1 Z" />
          </g>
        )}
        {id === "nonprofit" && (
          <g>
            <circle cx={10} cy={10} r="8" />
            <ellipse cx={10} cy={10} rx="3" ry="8" />
            <path d="M2 10 L18 10" />
          </g>
        )}
        {id === "edu" && (
          <g>
            <path d="M1 7 L10 3 L19 7 L10 11 Z" />
            <path d="M5 9 L5 14 C 5 16, 15 16, 15 14 L 15 9" />
            <path d="M19 7 L19 12" />
          </g>
        )}
        {id === "ai" && (
          <g>
            <circle cx={10} cy={10} r="6" />
            <circle cx={10} cy={10} r="2" fill={color} />
            <path d="M10 4 L10 1 M10 16 L10 19 M4 10 L1 10 M16 10 L19 10" />
          </g>
        )}
      </g>
    );
  };

  return (
    <svg viewBox="0 0 1220 660" width="100%" height="100%" style={{ overflow: "visible" }}>
      <defs><EdgeDefs t={t} mode={mode} /></defs>
      <circle cx={400} cy={280} r="260" fill={`url(#modelGlow-${mode})`} />

      {/* connector lines between adjacent hexes */}
      {hexes.map((h, i) => hexes.slice(i + 1).map((other, j) => {
        const pa = hexPos(h.row, h.col), pb = hexPos(other.row, other.col);
        const dist = Math.hypot(pa.x - pb.x, pa.y - pb.y);
        if (dist > HEX_W * 1.4) return null;
        return (
          <line key={`${i}-${j}`} x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y}
            stroke={t.teal} strokeWidth="0.7" strokeDasharray="2 4" opacity="0.35" />
        );
      }))}

      {/* hexes */}
      {hexes.map((h, i) => {
        const p = hexPos(h.row, h.col);
        const isActive = i === active;
        return (
          <g key={h.id}
            style={{
              transformOrigin: `${p.x}px ${p.y}px`,
              animation: `mwPop 0.5s ${0.2 + i * 0.15}s cubic-bezier(.2,1.4,.4,1) backwards`,
              transition: "all 0.3s ease",
            }}>
            <polygon points={hexPoints(p.x, p.y)}
              fill={isActive ? t.teal : t.nodeFill}
              stroke={isActive ? t.teal : t.border}
              strokeWidth={isActive ? 1.8 : 1.2} />
            {isActive && (
              <polygon points={hexPoints(p.x, p.y, HEX_R + 6)}
                fill="none" stroke={t.teal} strokeWidth="1.2" opacity="0.4"
                style={{ animation: "mwPulseStroke 2s infinite" }} />
            )}
            <Icon id={h.id} x={p.x} y={p.y - 18}
              color={isActive ? (mode === "dark" ? t.bg : "#FFFFFF") : t.teal} />
            <text x={p.x} y={p.y + 22} textAnchor="middle"
              fontFamily="'Courier New', monospace" fontSize="10" fontWeight="700"
              fill={isActive ? (mode === "dark" ? t.bg : "#FFFFFF") : t.text1}
              letterSpacing="0.08em">{h.label}</text>
          </g>
        );
      })}

      {/* floating stat card to the right of active hex */}
      <g key={active} style={{ animation: "mwStatPop 2.5s ease forwards" }}>
        <rect x={840} y={pos.y - 50} width={340} height={100} rx="12"
          fill={t.surface1} stroke={t.teal} strokeWidth="1.4" />
        <text x={860} y={pos.y - 22} fontFamily="'Courier New', monospace" fontSize="10" fontWeight="700"
          fill={t.teal} letterSpacing="0.18em">· CASE · {activeHex.label} ·</text>
        <text x={860} y={pos.y + 6} fontFamily="'Inter', sans-serif" fontSize="20" fontWeight="900"
          fill={t.text1} letterSpacing="-0.02em">{activeHex.stat}</text>
        <text x={860} y={pos.y + 30} fontFamily="'Courier New', monospace" fontSize="10"
          fill={t.text2} letterSpacing="0.1em">→ INDUSTRY EXPERIENCE</text>
        {/* connector */}
        <line x1={pos.x + HEX_R} y1={pos.y} x2={840} y2={pos.y}
          stroke={t.teal} strokeWidth="1" strokeDasharray="3 4" opacity="0.6" />
      </g>

      <Crosshairs t={t} />
    </svg>
  );
}

Object.assign(window, { SchemStrategy, SchemDataEng, SchemBlog, SchemIndustries });
